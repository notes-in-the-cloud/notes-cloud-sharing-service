spring.application.name=sharing-service
server.port=${SERVER_PORT:8083}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${POSTGRES_DB:notes_cloud}
spring.datasource.username=${POSTGRES_USER:notes_cloud_user}
spring.datasource.password=${POSTGRES_PASSWORD:notes_cloud_password}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

notes-service.url=${NOTES_SERVICE_URL:http://localhost:8082}
sharing.public-base-url=${SHARING_PUBLIC_BASE_URL:http://localhost:8083}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true
management.endpoint.health.show-details=always