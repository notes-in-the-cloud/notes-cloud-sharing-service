spring.application.name=${SPRING_APPLICATION_NAME:sharing-service}
server.port=${SERVER_PORT:8083}

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

notes-service.url=${NOTES_SERVICE_URL:http://localhost:8082}
sharing.public-base-url=${SHARING_PUBLIC_BASE_URL:http://localhost:8083}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true
management.endpoint.health.show-details=always